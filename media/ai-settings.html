<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="{{CSP}}" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: var(--vscode-font-family, sans-serif);
      font-size: var(--vscode-font-size, 13px);
      color: var(--vscode-foreground, #e0e0e0);
      background: var(--vscode-editor-background, #1e1e1e);
      padding: 20px 24px;
      line-height: 1.5;
      max-width: 640px;
    }
    h2 { margin: 0 0 8px; font-size: 18px; }
    .subtitle { color: #888; font-size: 12px; margin-bottom: 20px; }
    label { display: block; font-size: 11px; color: #aaa; margin-bottom: 4px; }
    .field { margin-bottom: 14px; }
    select, input {
      width: 100%;
      background: #3c3c3c;
      color: #e0e0e0;
      border: 1px solid #555;
      border-radius: 4px;
      padding: 8px 10px;
      font: inherit;
    }
    .hint { font-size: 11px; color: #888; margin-top: 4px; }
    .status {
      padding: 10px 12px;
      border-radius: 4px;
      background: #2d2d2d;
      border: 1px solid #444;
      font-size: 12px;
      margin-bottom: 16px;
    }
    .status.ok { border-color: #3a8; color: #8d8; }
    .status.err { border-color: #844; color: #f88; }
    .actions { display: flex; gap: 8px; margin-top: 20px; }
    button {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      background: #0e639c;
      color: #fff;
    }
    button.secondary { background: #444; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <h2>AI Provider 设置</h2>
  <p class="subtitle">配置 DeepSeek 或其他 OpenAI 兼容 API。Assist 模式用于精炼 Prompt；Agent 模式用于 MCP 多轮项目分析。API Key 安全存储于 VS Code Secret Storage。</p>

  <div id="status" class="status">正在加载…</div>

  <div class="field">
    <label for="provider">Provider</label>
    <select id="provider">
      <option value="none">关闭（仅本地 Prompt 生成）</option>
      <option value="deepseek">DeepSeek</option>
      <option value="openai">OpenAI</option>
      <option value="anthropic">Anthropic（兼容网关）</option>
      <option value="custom">自定义 OpenAI 兼容</option>
    </select>
  </div>

  <div class="field">
    <label for="baseUrl">Base URL</label>
    <input id="baseUrl" type="text" placeholder="https://api.deepseek.com" />
    <div class="hint">切换 Provider 时会自动填入默认值，可手动覆盖</div>
  </div>

  <div class="field">
    <label for="model">Model</label>
    <input id="model" type="text" placeholder="deepseek-chat" />
  </div>

  <div class="field">
    <label for="apiKey">API Key</label>
    <input id="apiKey" type="password" placeholder="留空则保持已保存的 Key 不变" autocomplete="off" />
    <div id="keyHint" class="hint"></div>
  </div>

  <div class="actions">
    <button id="btnSave">保存设置</button>
    <button id="btnTest" class="secondary">测试连接</button>
  </div>

  <script nonce="{{NONCE}}">
(function () {
  var vscode = acquireVsCodeApi();
  var defaults = { baseUrls: {}, models: {} };
  var $ = function (id) { return document.getElementById(id); };
  var statusEl = $('status');
  var providerEl = $('provider');
  var baseUrlEl = $('baseUrl');
  var modelEl = $('model');
  var apiKeyEl = $('apiKey');
  var keyHintEl = $('keyHint');
  var btnSave = $('btnSave');
  var btnTest = $('btnTest');

  function setStatus(text, kind) {
    statusEl.textContent = text;
    statusEl.className = 'status' + (kind === 'ok' ? ' ok' : kind === 'err' ? ' err' : '');
  }

  function applyProviderDefaults() {
    var p = providerEl.value;
    if (defaults.baseUrls[p]) baseUrlEl.value = defaults.baseUrls[p];
    if (defaults.models[p]) modelEl.value = defaults.models[p];
  }

  providerEl.addEventListener('change', applyProviderDefaults);

  function collectSettings(includeKey) {
    var payload = {
      provider: providerEl.value,
      baseUrl: baseUrlEl.value.trim(),
      model: modelEl.value.trim(),
    };
    if (includeKey && apiKeyEl.value.trim()) {
      payload.apiKey = apiKeyEl.value.trim();
    }
    return payload;
  }

  btnSave.addEventListener('click', function () {
    btnSave.disabled = true;
    setStatus('正在保存…');
    vscode.postMessage(Object.assign({ type: 'save' }, collectSettings(true)));
  });

  btnTest.addEventListener('click', function () {
    btnTest.disabled = true;
    setStatus('正在测试连接…');
    vscode.postMessage(Object.assign({ type: 'test' }, collectSettings(true)));
  });

  window.addEventListener('message', function (e) {
    var msg = e.data;
    btnSave.disabled = false;
    btnTest.disabled = false;
    if (msg.type === 'init') {
      defaults = msg.defaults || defaults;
      providerEl.value = msg.provider || 'none';
      baseUrlEl.value = msg.baseUrl || '';
      modelEl.value = msg.model || '';
      keyHintEl.textContent = msg.hasApiKey ? '✓ 已保存 API Key（输入新值可覆盖）' : '尚未配置 API Key';
      setStatus('就绪');
    } else if (msg.type === 'saved') {
      apiKeyEl.value = '';
      keyHintEl.textContent = msg.hasApiKey ? '✓ 已保存 API Key' : '尚未配置 API Key';
      setStatus(msg.message || '已保存', 'ok');
    } else if (msg.type === 'testResult') {
      setStatus(
        (msg.ok ? '✓ ' : '✗ ') + msg.message + (msg.latencyMs ? ' (' + msg.latencyMs + 'ms)' : ''),
        msg.ok ? 'ok' : 'err',
      );
    } else if (msg.type === 'error') {
      setStatus(msg.message || '操作失败', 'err');
    }
  });

  vscode.postMessage({ type: 'ready' });
})();
  </script>
</body>
</html>
