name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20' # 推荐；本地 Node 16+ 可运行 test（runner 不依赖 node --test）
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run compile

      - run: npm test

      - run: npm run package

      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: '*.vsix'
